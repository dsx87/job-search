name: Render base CV

# Manually regenerate the committed sample PDF from the .tex source.
# CV_PHONE is intentionally left unset here, so the public sample shows no
# phone number. The daily pipeline injects the real number from the secret.
on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-extra \
            fonts-crosextra-carlito

      - name: Render masked base CV PDF
        run: python3 render_base_cv.py

      - name: Commit regenerated PDF
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add igor_pivnyk_cv_base_updated.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate masked base CV PDF [skip ci]"
          git push
