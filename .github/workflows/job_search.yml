name: Daily Job Search

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 10:00 Israel time
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  search:
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-extra \
            fonts-crosextra-carlito

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright (secrettelaviv source)
        run: python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          CV_PHONE: ${{ secrets.CV_PHONE }}
        run: python3 -u pipeline.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          if git diff --cached --quiet; then
            echo "No seen_jobs.json changes to commit."
            exit 0
          fi
          git commit -m "chore: update seen jobs state [skip ci]"

          # Push with retry: if another push landed on main meanwhile, the push
          # is rejected. Rather than a textual rebase (which can corrupt the JSON
          # array), rebuild seen_jobs.json as the set-union of our keys and the
          # remote's, recommit on top of the remote tip, and retry.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); merging remote seen_jobs.json and retrying..."
            git fetch origin main
            python3 - <<'PY'
          import json, subprocess
          def keys(ref):
              r = subprocess.run(["git", "show", f"{ref}:seen_jobs.json"],
                                 capture_output=True, text=True)
              if r.returncode != 0 or not r.stdout.strip():
                  return set()
              return set(json.loads(r.stdout))
          merged = sorted(keys("HEAD") | keys("origin/main"))
          with open("/tmp/seen_union.json", "w") as f:
              json.dump(merged, f, indent=2)
          PY
            git reset --hard origin/main
            cp /tmp/seen_union.json seen_jobs.json
            git add seen_jobs.json
            if git diff --cached --quiet; then
              echo "Remote already has all our keys; nothing to push."
              exit 0
            fi
            git commit -m "chore: update seen jobs state [skip ci]"
          done
          echo "Failed to push seen_jobs.json after retries." >&2
          exit 1
