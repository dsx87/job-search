name: Daily Job Search

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = 10:00 Israel time
  workflow_dispatch:        # allow manual trigger from the Actions tab

jobs:
  search:
    runs-on: ubuntu-slim
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-extra \
            fonts-crosextra-carlito

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python3 -u pipeline.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update seen jobs state [skip ci]"
          git push
