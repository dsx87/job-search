name: Verify secrettelaviv (one-off)

# Temporary: confirm the Playwright-based secrettelaviv source works end-to-end
# through the scraper's thread pool on CI, with no pipeline side effects.
# Delete this workflow once verified.
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Scrape secrettelaviv only
        run: python3 -u portable_job_scraper.py --sources secrettelaviv --max-age 0 --verbose
